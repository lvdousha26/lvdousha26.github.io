baseURL = 'https://lvdousha26.github.io/'
languageCode = 'zh-CN'
title = '绿豆沙的博客'
theme = 'hugo-theme-reimu'

defaultContentLanguage = 'zh-CN'
[languages]
[languages.en]
languageName = 'English'
weight = 1
[languages.zh-CN]
languageName = '简体中文'
weight = 1
hasCJKLanguage = true
[languages.zh-TW]
languageName = '繁體中文'
weight = 1
hasCJKLanguage = true
[languages.ja]
languageName = '日本語'
weight = 1
hasCJKLanguage = true

[markup.goldmark.extensions.passthrough]
enable = true
delimiters.block = [["\\[", "\\]"], ["$$", "$$"]]
delimiters.inline = [["\\(", "\\)"], ["$", "$"]]

[markup.highlight]
guessSyntax = true
noClasses = false

[security.http]
urls = ['https://cnmiw\.com/.*', 'https://setu\.iw233\.top/.*']
methods = ['(?i)GET']
mediaTypes = ['application/json', 'image/.*']

[outputs]
home = ["HTML", "RSS"]
