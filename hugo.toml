baseURL = 'https://lvdousha26.github.io/'
languageCode = 'zh-CN'
title = '绿豆沙的博客'
theme = 'hugo-theme-reimu'

defaultContentLanguage = 'zh-CN'
defaultContentLanguageInSubDir = false

[languages]
[languages.en]
label = 'English'
weight = 1
title = 'Mung Bean Blog'
[languages.en.params]
language = 'en'

[languages.zh-CN]
label = '简体中文'
weight = 1
hasCJKLanguage = true
title = '绿豆沙的博客'
[languages.zh-CN.params]
language = 'zh-CN'

[languages.zh-TW]
label = '繁體中文'
weight = 1
hasCJKLanguage = true
title = '綠豆沙的部落格'
[languages.zh-TW.params]
language = 'zh-TW'

[languages.ja]
label = '日本語'
weight = 1
hasCJKLanguage = true
title = '緑豆沙のブログ'
[languages.ja.params]
language = 'ja'

[markup.goldmark.extensions.passthrough]
enable = true
delimiters.block = [["\\[", "\\]"], ["$$", "$$"]]
delimiters.inline = [["\\(", "\\)"], ["$", "$"]]

[markup.highlight]
guessSyntax = true
noClasses = false

[security.http]
urls = ['https://cnmiw\.com/.*', 'https://idnm\.de/.*', 'https://setu\.iw233\.top/.*']
methods = ['(?i)GET']
mediaTypes = ['application/json', 'image/.*']

[outputs]
home = ["HTML", "RSS"]
